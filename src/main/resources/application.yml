zeebe:
  client:
    broker:
      gateway-address: localhost:26500
    security:
      plaintext: true

spring:
  datasource:
    url: jdbc:h2:mem:camundadb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  oauth2:
    resourceserver:
      jwt:
        issuer-uri: http://localhost:18080/realms/camunda-demo